version: "2"
run:
  timeout: 5m
  tests: true
output:
  formats:
    text:
      path: stdout
      color: true
linters:
  default: none
  enable:
    - errcheck
    - goconst
    - govet
    - unused
  settings:
    lll:
      line-length: 220
      tab-width: 1
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - goconst
          - govet
        path: (.+)_test.go
    paths:
      - generated
      - third_party$
      - builtin$
      - examples$
severity:
  default: error
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - generated
      - third_party$
      - builtin$
      - examples$
